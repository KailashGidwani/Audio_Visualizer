<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Visualizer Video Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #b0b0b0;
            font-size: 1.1rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            margin-bottom: 30px;
        }

        .visualizer-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .controls-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
        }

        .upload-area {
            border: 2px dashed #4ecdc4;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #45b7d1;
            background: rgba(78, 205, 196, 0.1);
        }

        .upload-area.dragover {
            border-color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }

        #canvas {
            width: 100%;
            height: 400px;
            border-radius: 10px;
            background: radial-gradient(circle at center, #2a2a4a, #1a1a2e);
            display: block;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .control-group input, .control-group select {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
        }

        .control-group input[type="range"] {
            background: transparent;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #4ecdc4, #45b7d1);
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .color-option.active {
            border-color: white;
            transform: scale(1.1);
        }

        .audio-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .recording-indicator {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            color: #ff6b6b;
        }

        .recording-dot {
            width: 12px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(45deg, #4ecdc4, #45b7d1);
            width: 0%;
            transition: width 0.1s ease;
        }

        .status-message {
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }

        .status-success {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            border: 1px solid rgba(78, 205, 196, 0.3);
        }

        .status-error {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            isValidAudioFile(file) {
                const validExtensions = ['.mp3', '.wav', '.m4a', '.ogg', '.aac', '.flac'];
                const validTypes = ['audio/mp3', 'audio/wav', 'audio/mpeg', 'audio/ogg', 'audio/m4a', 'audio/aac', 'audio/flac'];
                
                const fileName = file.name.toLowerCase();
                const hasValidExtension = validExtensions.some(ext => fileName.endsWith(ext));
                const hasValidType = validTypes.some(type => file.type.includes(type.split('/')[1]));
                
                return hasValidExtension || hasValidType;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            #canvas {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Audio Visualizer Studio</h1>
            <p>Create stunning visualizer videos from your audio files</p>
        </div>

        <div class="main-content">
            <div class="visualizer-section">
                <div class="upload-area" id="uploadArea">
                    <div>
                        <h3>📁 Drop your audio file here</h3>
                        <p>or click to browse</p>
                        <small>Supports MP3, WAV, M4A, OGG</small>
                    </div>
                    <input type="file" id="audioFile" accept="audio/*" style="display: none;">
                </div>

                <canvas id="canvas"></canvas>

                <div class="audio-controls">
                    <button class="btn btn-secondary" id="playBtn">▶️ Play</button>
                    <button class="btn btn-secondary" id="pauseBtn">⏸️ Pause</button>
                    <button class="btn btn-primary" id="recordBtn">🎥 Record Video</button>
                    <button class="btn btn-secondary" id="downloadBtn" style="display: none;">💾 Download</button>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="recording-indicator" id="recordingIndicator">
                    <div class="recording-dot"></div>
                    <span>Recording video...</span>
                </div>

                <div class="status-message" id="statusMessage"></div>
            </div>

            <div class="controls-panel">
                <h3 style="margin-bottom: 20px; color: #4ecdc4;">🎨 Customize</h3>

                <div class="control-group">
                    <label>Visualizer Style</label>
                    <select id="visualizerType">
                        <option value="bars">Frequency Bars</option>
                        <option value="circle">Circular Bars</option>
                        <option value="waveform">Waveform</option>
                        <option value="particles">Particles</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Sensitivity: <span id="sensitivityValue">1.5</span></label>
                    <input type="range" id="sensitivity" min="0.5" max="3" step="0.1" value="1.5">
                </div>

                <div class="control-group">
                    <label>Smoothing: <span id="smoothingValue">0.8</span></label>
                    <input type="range" id="smoothing" min="0" max="0.95" step="0.05" value="0.8">
                </div>

                <div class="control-group">
                    <label>Bar Count: <span id="barCountValue">64</span></label>
                    <input type="range" id="barCount" min="16" max="256" step="16" value="64">
                </div>

                <div class="control-group">
                    <label>Color Theme</label>
                    <div class="color-picker">
                        <div class="color-option active" data-colors='["#ff6b6b", "#4ecdc4", "#45b7d1"]' style="background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);"></div>
                        <div class="color-option" data-colors='["#ff9a9e", "#fecfef", "#fecfef"]' style="background: linear-gradient(45deg, #ff9a9e, #fecfef);"></div>
                        <div class="color-option" data-colors='["#a8edea", "#fed6e3", "#d299c2"]' style="background: linear-gradient(45deg, #a8edea, #fed6e3);"></div>
                        <div class="color-option" data-colors='["#ffecd2", "#fcb69f", "#ff8a80"]' style="background: linear-gradient(45deg, #ffecd2, #fcb69f);"></div>
                        <div class="color-option" data-colors='["#667eea", "#764ba2", "#f093fb"]' style="background: linear-gradient(45deg, #667eea, #764ba2);"></div>
                        <div class="color-option" data-colors='["#f093fb", "#f5576c", "#4facfe"]' style="background: linear-gradient(45deg, #f093fb, #f5576c);"></div>
                    </div>
                </div>

                <div class="control-group">
                    <label>Background</label>
                    <select id="backgroundType">
                        <option value="gradient">Gradient</option>
                        <option value="solid">Solid Color</option>
                        <option value="black">Black</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Video Quality</label>
                    <select id="videoQuality">
                        <option value="720">720p (HD)</option>
                        <option value="1080">1080p (Full HD)</option>
                        <option value="480">480p (SD)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <script>
        class AudioVisualizer {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.audioContext = null;
                this.analyser = null;
                this.dataArray = null;
                this.source = null;
                this.audio = null;
                this.animationId = null;
                this.isPlaying = false;
                this.isRecording = false;
                this.mediaRecorder = null;
                this.recordedChunks = [];
                
                this.settings = {
                    sensitivity: 1.5,
                    smoothing: 0.8,
                    barCount: 64,
                    colors: ['#ff6b6b', '#4ecdc4', '#45b7d1'],
                    visualizerType: 'bars',
                    backgroundType: 'gradient',
                    videoQuality: '720'
                };

                this.setupCanvas();
                this.setupEventListeners();
            }

            setupCanvas() {
                const rect = this.canvas.getBoundingClientRect();
                this.canvas.width = rect.width * window.devicePixelRatio;
                this.canvas.height = rect.height * window.devicePixelRatio;
                this.ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
                this.canvas.style.width = rect.width + 'px';
                this.canvas.style.height = rect.height + 'px';
            }

            setupEventListeners() {
                // File upload with better validation
                const uploadArea = document.getElementById('uploadArea');
                const audioFile = document.getElementById('audioFile');

                uploadArea.addEventListener('click', () => audioFile.click());
                
                uploadArea.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    uploadArea.classList.add('dragover');
                });
                
                uploadArea.addEventListener('dragleave', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('dragover');
                });
                
                uploadArea.addEventListener('drop', (e) => {
                    e.preventDefault();
                    uploadArea.classList.remove('dragover');
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        const file = files[0];
                        if (this.isValidAudioFile(file)) {
                            this.loadAudioFile(file);
                        } else {
                            this.showStatus('Please select a valid audio file (MP3, WAV, M4A, OGG)', 'error');
                        }
                    }
                });

                audioFile.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        const file = e.target.files[0];
                        if (this.isValidAudioFile(file)) {
                            this.loadAudioFile(file);
                        } else {
                            this.showStatus('Please select a valid audio file (MP3, WAV, M4A, OGG)', 'error');
                        }
                    }
                });

                // Audio controls
                document.getElementById('playBtn').addEventListener('click', () => this.play());
                document.getElementById('pauseBtn').addEventListener('click', () => this.pause());
                document.getElementById('recordBtn').addEventListener('click', () => this.toggleRecording());
                document.getElementById('downloadBtn').addEventListener('click', () => this.downloadVideo());

                // Settings controls
                this.setupControlListeners();

                // Window resize
                window.addEventListener('resize', () => this.setupCanvas());
            }

            setupControlListeners() {
                const controls = {
                    sensitivity: 'sensitivityValue',
                    smoothing: 'smoothingValue',
                    barCount: 'barCountValue'
                };

                Object.keys(controls).forEach(control => {
                    const input = document.getElementById(control);
                    const display = document.getElementById(controls[control]);
                    
                    input.addEventListener('input', (e) => {
                        this.settings[control] = parseFloat(e.target.value);
                        display.textContent = e.target.value;
                        if (control === 'barCount') {
                            this.updateAnalyser();
                        }
                    });
                });

                document.getElementById('visualizerType').addEventListener('change', (e) => {
                    this.settings.visualizerType = e.target.value;
                });

                document.getElementById('backgroundType').addEventListener('change', (e) => {
                    this.settings.backgroundType = e.target.value;
                });

                document.getElementById('videoQuality').addEventListener('change', (e) => {
                    this.settings.videoQuality = e.target.value;
                });

                // Color picker
                document.querySelectorAll('.color-option').forEach(option => {
                    option.addEventListener('click', (e) => {
                        document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
                        e.target.classList.add('active');
                        this.settings.colors = JSON.parse(e.target.dataset.colors);
                    });
                });
            }

            async loadAudioFile(file) {
                try {
                    this.showStatus('Loading audio file...', 'success');
                    
                    // Validate file type
                    if (!this.isValidAudioFile(file)) {
                        throw new Error('Unsupported audio format. Please use MP3, WAV, M4A, or OGG files.');
                    }

                    // Clean up previous audio
                    if (this.audio) {
                        this.audio.pause();
                        this.audio.currentTime = 0;
                        if (this.audio.src && this.audio.src.startsWith('blob:')) {
                            URL.revokeObjectURL(this.audio.src);
                        }
                        this.audio = null;
                    }

                    // Clean up previous audio context
                    if (this.audioContext) {
                        await this.audioContext.close();
                        this.audioContext = null;
                    }

                    // Create audio buffer from file
                    const arrayBuffer = await file.arrayBuffer();
                    
                    // Create audio context first
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Decode audio data
                    const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                    
                    // Create audio element for playback control
                    this.audio = new Audio();
                    const audioUrl = URL.createObjectURL(file);
                    this.audio.src = audioUrl;
                    this.audio.crossOrigin = 'anonymous';
                    
                    // Wait for audio to be ready
                    await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => {
                            reject(new Error('Audio loading timeout'));
                        }, 15000);

                        this.audio.addEventListener('canplaythrough', () => {
                            clearTimeout(timeout);
                            resolve();
                        }, { once: true });

                        this.audio.addEventListener('error', (e) => {
                            clearTimeout(timeout);
                            // Try alternative loading method
                            this.loadAudioAlternative(file).then(resolve).catch(reject);
                        }, { once: true });

                        this.audio.load();
                    });

                    // Setup audio analysis
                    await this.setupAudioContext();
                    this.showStatus(`Audio loaded: ${file.name}`, 'success');
                    
                    // Setup event listeners
                    this.setupAudioEventListeners();

                } catch (error) {
                    console.error('Audio loading error:', error);
                    // Try alternative loading method
                    try {
                        await this.loadAudioAlternative(file);
                    } catch (altError) {
                        this.showStatus(`Error: ${error.message}`, 'error');
                        console.error('Alternative loading also failed:', altError);
                    }
                }
            }

            async loadAudioAlternative(file) {
                try {
                    this.showStatus('Trying alternative loading method...', 'success');
                    
                    // Use FileReader as alternative
                    const fileReader = new FileReader();
                    const arrayBuffer = await new Promise((resolve, reject) => {
                        fileReader.onload = () => resolve(fileReader.result);
                        fileReader.onerror = () => reject(new Error('FileReader error'));
                        fileReader.readAsArrayBuffer(file);
                    });

                    // Create audio context if not exists
                    if (!this.audioContext) {
                        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }

                    // Decode audio
                    const audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                    
                    // Create a simple audio element with data URL
                    this.audio = new Audio();
                    const blob = new Blob([arrayBuffer], { type: file.type });
                    const dataUrl = await new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    });
                    
                    this.audio.src = dataUrl;
                    
                    await new Promise((resolve, reject) => {
                        this.audio.addEventListener('loadeddata', resolve, { once: true });
                        this.audio.addEventListener('error', reject, { once: true });
                    });

                    await this.setupAudioContext();
                    this.setupAudioEventListeners();
                    this.showStatus(`Audio loaded: ${file.name} (alternative method)`, 'success');
                    
                } catch (error) {
                    throw new Error(`Alternative loading failed: ${error.message}`);
                }
            }

            setupAudioEventListeners() {
                // Update progress bar during playback
                this.audio.addEventListener('timeupdate', () => {
                    if (this.audio.duration) {
                        const progress = (this.audio.currentTime / this.audio.duration) * 100;
                        document.getElementById('progressFill').style.width = progress + '%';
                    }
                });

                // Handle audio end
                this.audio.addEventListener('ended', () => {
                    this.isPlaying = false;
                    if (this.animationId) {
                        cancelAnimationFrame(this.animationId);
                    }
                    document.getElementById('progressFill').style.width = '0%';
                });

                // Handle audio errors during playback
                this.audio.addEventListener('error', (e) => {
                    this.showStatus('Playback error occurred', 'error');
                    console.error('Audio playback error:', e);
                });
            }

            async setupAudioContext() {
                try {
                    // Clean up existing context
                    if (this.audioContext) {
                        await this.audioContext.close();
                    }

                    // Create new audio context
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // Handle suspended context (required by browser policies)
                    if (this.audioContext.state === 'suspended') {
                        await this.audioContext.resume();
                    }

                    // Create audio source
                    this.source = this.audioContext.createMediaElementSource(this.audio);
                    this.analyser = this.audioContext.createAnalyser();
                    
                    // Configure analyser
                    this.updateAnalyser();
                    
                    // Connect audio graph
                    this.source.connect(this.analyser);
                    this.analyser.connect(this.audioContext.destination);

                    console.log('Audio context setup complete:', {
                        state: this.audioContext.state,
                        sampleRate: this.audioContext.sampleRate
                    });

                } catch (error) {
                    console.error('Audio context setup error:', error);
                    throw new Error(`Audio context failed: ${error.message}`);
                }
            }

            updateAnalyser() {
                if (!this.analyser) return;
                
                this.analyser.fftSize = this.settings.barCount * 4;
                this.analyser.smoothingTimeConstant = this.settings.smoothing;
                this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
            }

            async play() {
                if (!this.audio) {
                    this.showStatus('Please load an audio file first', 'error');
                    return;
                }

                try {
                    // Ensure audio context is ready
                    if (this.audioContext && this.audioContext.state === 'suspended') {
                        await this.audioContext.resume();
                    }

                    // Start playback
                    await this.audio.play();
                    this.isPlaying = true;
                    this.animate();
                    
                    this.showStatus('Playing...', 'success');
                    
                } catch (error) {
                    this.showStatus(`Playback error: ${error.message}`, 'error');
                    console.error('Play error:', error);
                }
            }

            pause() {
                if (this.audio) {
                    this.audio.pause();
                    this.isPlaying = false;
                    if (this.animationId) {
                        cancelAnimationFrame(this.animationId);
                    }
                }
            }

            animate() {
                if (!this.isPlaying) return;

                this.animationId = requestAnimationFrame(() => this.animate());
                
                if (this.analyser && this.dataArray) {
                    this.analyser.getByteFrequencyData(this.dataArray);
                    this.draw();
                }
            }

            draw() {
                const width = this.canvas.width / window.devicePixelRatio;
                const height = this.canvas.height / window.devicePixelRatio;
                
                // Clear canvas
                this.ctx.clearRect(0, 0, width, height);
                
                // Draw background
                this.drawBackground(width, height);
                
                // Draw visualizer
                switch (this.settings.visualizerType) {
                    case 'bars':
                        this.drawBars(width, height);
                        break;
                    case 'circle':
                        this.drawCircularBars(width, height);
                        break;
                    case 'waveform':
                        this.drawWaveform(width, height);
                        break;
                    case 'particles':
                        this.drawParticles(width, height);
                        break;
                }
            }

            drawBackground(width, height) {
                if (this.settings.backgroundType === 'gradient') {
                    const gradient = this.ctx.createRadialGradient(
                        width/2, height/2, 0,
                        width/2, height/2, Math.max(width, height)/2
                    );
                    gradient.addColorStop(0, '#2a2a4a');
                    gradient.addColorStop(1, '#1a1a2e');
                    this.ctx.fillStyle = gradient;
                } else if (this.settings.backgroundType === 'solid') {
                    this.ctx.fillStyle = '#1a1a2e';
                } else {
                    this.ctx.fillStyle = '#000000';
                }
                
                this.ctx.fillRect(0, 0, width, height);
            }

            drawBars(width, height) {
                const barWidth = width / this.settings.barCount;
                const colors = this.settings.colors;
                
                for (let i = 0; i < this.settings.barCount; i++) {
                    const barHeight = (this.dataArray[i] / 255) * height * this.settings.sensitivity;
                    const colorIndex = Math.floor((i / this.settings.barCount) * colors.length);
                    const color = colors[colorIndex % colors.length];
                    
                    this.ctx.fillStyle = color;
                    this.ctx.fillRect(
                        i * barWidth,
                        height - barHeight,
                        barWidth - 2,
                        barHeight
                    );
                }
            }

            drawCircularBars(width, height) {
                const centerX = width / 2;
                const centerY = height / 2;
                const radius = Math.min(width, height) / 4;
                const colors = this.settings.colors;
                
                for (let i = 0; i < this.settings.barCount; i++) {
                    const angle = (i / this.settings.barCount) * Math.PI * 2;
                    const barHeight = (this.dataArray[i] / 255) * radius * this.settings.sensitivity;
                    const colorIndex = Math.floor((i / this.settings.barCount) * colors.length);
                    const color = colors[colorIndex % colors.length];
                    
                    const x1 = centerX + Math.cos(angle) * radius;
                    const y1 = centerY + Math.sin(angle) * radius;
                    const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                    const y2 = centerY + Math.sin(angle) * (radius + barHeight);
                    
                    this.ctx.strokeStyle = color;
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x1, y1);
                    this.ctx.lineTo(x2, y2);
                    this.ctx.stroke();
                }
            }

            drawWaveform(width, height) {
                const sliceWidth = width / this.settings.barCount;
                let x = 0;
                
                this.ctx.lineWidth = 3;
                this.ctx.strokeStyle = this.settings.colors[0];
                this.ctx.beginPath();
                
                for (let i = 0; i < this.settings.barCount; i++) {
                    const v = (this.dataArray[i] / 255) * this.settings.sensitivity;
                    const y = (v * height / 2) + (height / 2);
                    
                    if (i === 0) {
                        this.ctx.moveTo(x, y);
                    } else {
                        this.ctx.lineTo(x, y);
                    }
                    
                    x += sliceWidth;
                }
                
                this.ctx.stroke();
            }

            drawParticles(width, height) {
                const colors = this.settings.colors;
                
                for (let i = 0; i < this.settings.barCount; i++) {
                    const intensity = (this.dataArray[i] / 255) * this.settings.sensitivity;
                    if (intensity > 0.1) {
                        const x = Math.random() * width;
                        const y = Math.random() * height;
                        const size = intensity * 10;
                        const colorIndex = Math.floor(Math.random() * colors.length);
                        
                        this.ctx.fillStyle = colors[colorIndex];
                        this.ctx.beginPath();
                        this.ctx.arc(x, y, size, 0, Math.PI * 2);
                        this.ctx.fill();
                    }
                }
            }

            async toggleRecording() {
                if (!this.isRecording) {
                    await this.startRecording();
                } else {
                    this.stopRecording();
                }
            }

            async startRecording() {
                try {
                    const stream = this.canvas.captureStream(30);
                    
                    // Add audio track if available
                    if (this.audio && this.audioContext) {
                        const dest = this.audioContext.createMediaStreamDestination();
                        this.source.connect(dest);
                        const audioTrack = dest.stream.getAudioTracks()[0];
                        if (audioTrack) {
                            stream.addTrack(audioTrack);
                        }
                    }
                    
                    this.mediaRecorder = new MediaRecorder(stream, {
                        mimeType: 'video/webm;codecs=vp9'
                    });
                    
                    this.recordedChunks = [];
                    
                    this.mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) {
                            this.recordedChunks.push(event.data);
                        }
                    };
                    
                    this.mediaRecorder.onstop = () => {
                        this.createVideoFile();
                    };
                    
                    this.mediaRecorder.start(100);
                    this.isRecording = true;
                    
                    document.getElementById('recordBtn').textContent = '⏹️ Stop Recording';
                    document.getElementById('recordingIndicator').style.display = 'flex';
                    this.showStatus('Recording started...', 'success');
                    
                } catch (error) {
                    this.showStatus('Error starting recording', 'error');
                    console.error('Recording error:', error);
                }
            }

            stopRecording() {
                if (this.mediaRecorder && this.isRecording) {
                    this.mediaRecorder.stop();
                    this.isRecording = false;
                    
                    document.getElementById('recordBtn').textContent = '🎥 Record Video';
                    document.getElementById('recordingIndicator').style.display = 'none';
                    this.showStatus('Recording stopped. Processing video...', 'success');
                }
            }

            createVideoFile() {
                const blob = new Blob(this.recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                
                const downloadBtn = document.getElementById('downloadBtn');
                downloadBtn.style.display = 'inline-block';
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `visualizer-${Date.now()}.webm`;
                    a.click();
                };
                
                this.showStatus('Video ready for download!', 'success');
            }

            downloadVideo() {
                if (this.recordedChunks.length > 0) {
                    const blob = new Blob(this.recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `audio-visualizer-${Date.now()}.webm`;
                    a.click();
                    URL.revokeObjectURL(url);
                }
            }

            showStatus(message, type) {
                const statusEl = document.getElementById('statusMessage');
                statusEl.textContent = message;
                statusEl.className = `status-message status-${type}`;
                statusEl.style.display = 'block';
                
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            }

            isValidAudioFile(file) {
                const validExtensions = ['.mp3', '.wav', '.m4a', '.ogg', '.aac', '.flac'];
                const validTypes = ['audio/mp3', 'audio/wav', 'audio/mpeg', 'audio/ogg', 'audio/m4a', 'audio/aac', 'audio/flac'];
                
                const fileName = file.name.toLowerCase();
                const hasValidExtension = validExtensions.some(ext => fileName.endsWith(ext));
                const hasValidType = validTypes.some(type => file.type.includes(type.split('/')[1]));
                
                return hasValidExtension || hasValidType;
            }
        }

        // Initialize the visualizer when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            new AudioVisualizer();
        });
    </script>
</body>
